name: "Copilot Setup Steps"

on:
    workflow_dispatch:

jobs:
    copilot-setup-steps:
        name: "Copilot Setup Steps"
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            # Python
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - run: pip install uv && uv sync

            # --- Verification ---
            # - name: Test
            #   run: uv run pytest
